<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASISTENCIA R12- Sistema de Asistencia</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="p-4 max-w-md mx-auto bg-gray-100">

    <!-- SECCIÓN 1: INTERFAZ DEL ELEMENTO (MÓVIL) -->
    <div id="vistaUsuario" class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100 mt-4">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-2xl font-bold text-[#691C32]">ASISTENCIA R12</h1>
            <button onclick="accederComoAdmin()" class="text-xs bg-gray-200 text-gray-700 px-3 py-1 rounded-lg font-medium">Panel Admin</button>
        </div>
        <p class="text-xs text-gray-500 mb-6">Registro de Asistencia</p>

        <form id="attendanceForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">ID PERSONAL</label>
                    <input type="text" id="idPersonal" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl text-sm placeholder-gray-400" placeholder="ID o Folio" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">NÓMINA</label>
                    <select id="selectNomina" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl text-sm" required>
                        <option value="">-- Selecciona --</option>
                        <option value="Servidor de la Nación">SERVIDOR DE LA NACIÓN</option>
                        <option value="UBA">SERVIDOR DE LA NACIÓN DE PROGRAMAS</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">NOMBRE</label>
                <select id="selectNombre" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl text-sm" required></select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">COMISIÓN DE TRABAJO</label>
                <select id="selectComision" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl text-sm" required></select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">MUNICIPIO</label>
                <select id="selectMunicipio" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl text-sm" required></select>
            </div>

            <div class="grid grid-cols-2 gap-2 bg-gray-50 p-3 rounded-xl border border-gray-200">
                <div>
                    <span class="block text-[11px] font-bold text-gray-500 uppercase">FECHA</span>
                    <span id="txtFecha" class="text-sm font-semibold text-gray-800">—</span>
                </div>
                <div>
                    <span class="block text-[11px] font-bold text-gray-500 uppercase">HORA</span>
                    <span id="txtHora" class="text-sm font-semibold text-gray-800">—</span>
                </div>
            </div>

            <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center bg-gray-50">
                <label class="block cursor-pointer">
                    <span class="text-indigo-600 font-medium text-sm block mb-2">📸 TOMAR FOTOGRAFÍA</span>
                    <input type="file" id="fotoInput" accept="image/*" capture="environment" class="hidden" required>
                </label>
                <div id="previewContainer" class="hidden mt-2">
                    <img id="fotoPreview" class="w-full h-40 object-cover rounded-lg mx-auto">
                </div>
            </div>

            <div id="gpsStatus" class="text-xs text-center text-gray-500 font-mono bg-gray-50 p-2 rounded-lg">
                DETECTANDO COORDENADAS GPS...
            </div>

            <button type="submit" class="w-full bg-[#691C32] text-white p-3.5 rounded-xl font-bold shadow-md hover:bg-[#4c1222]">
                REGISTRAR ASISTENCIA
            </button>
        </form>
    </div>

    <!-- SECCIÓN 2: PANEL ADMINISTRADOR PRIVADO (REPORTES, CRUCES Y RESET) -->
    <div id="vistaAdmin" class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100 mt-4 hidden">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-gray-800">PANEL DE CONTROL EXCLUSIVO</h2>
            <button onclick="cerrarSesionAdmin()" class="text-xs bg-gray-600 text-white px-3 py-1 rounded-lg">Cerrar Sesión</button>
        </div>

        <!-- Botones de Acción -->
        <div class="grid grid-cols-2 gap-2 mb-4">
            <button onclick="exportarExcel()" class="bg-green-700 text-white p-2.5 rounded-xl text-sm font-bold shadow hover:bg-green-800">
                📊 Descargar Excel
            </button>
            <button onclick="ejecutarCruce()" class="bg-indigo-600 text-white p-2.5 rounded-xl text-sm font-bold shadow hover:bg-indigo-700">
                🔍 Recargar Cruce
            </button>
        </div>

        <!-- Botón de Reset Total -->
        <div class="mb-6">
            <button onclick="resetearSistema()" class="w-full bg-red-600 text-white p-2 rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-red-700 shadow">
                🚨 Resetear / Limpiar Todos los Registros
            </button>
        </div>

        <!-- Resultados del Cruce -->
        <div class="space-y-4">
            <div class="bg-red-50 p-4 rounded-xl border border-red-200">
                <h3 class="text-sm font-bold text-red-800 mb-2">⚠️ ELEMENTOS OMISOS HOY (<span id="numOmisos">0</span>)</h3>
                <ul id="listaOmisos" class="text-xs text-red-700 list-disc pl-4 space-y-1 max-h-40 overflow-y-auto">
                    <!-- Elementos faltantes -->
                </ul>
            </div>

            <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                <h3 class="text-sm font-bold text-gray-800 mb-2">📋 Asistencias Registradas (<span id="numAsistencias">0</span>)</h3>
                <div id="tablaAsistencias" class="text-[11px] text-gray-600 space-y-2 max-h-60 overflow-y-auto">
                    <!-- Registros guardados -->
                </div>
            </div>
        </div>
    </div>

            municipios: ["SAN PEDRO TLAQUEPAQUE","TLAJOMULCO DE ZUÑIGA"]

        let coordenadas = { lat: null, lon: null };
        let fotoBase64 = "";
        let fechaAuto = "";
        let horaAuto = "";

        function accederComoAdmin() {
            const intentoClave = prompt("Introduce la clave de Administrador:");
            if (intentoClave === CLAVE_ADMIN_SECRETA) {
                cambiarVista('vistaAdmin');
            } else if (intentoClave !== null) {
                alert("❌ Clave incorrecta.");
            }
        }

        function cerrarSesionAdmin() { cambiarVista('vistaUsuario'); }

        function cambiarVista(idVista) {
            document.getElementById('vistaUsuario').classList.add('hidden');
            document.getElementById('vistaAdmin').classList.add('hidden');
            document.getElementById(idVista).classList.remove('hidden');
            if(idVista === 'vistaAdmin') cargarDatosAdmin();
        }

        function actualizarReloj() {
            const ahora = new Date();
            fechaAuto = ahora.toLocaleDateString('es-MX');
            horaAuto = !isNaN(ahora) ? ahora.toLocaleTimeString('es-MX', { hour12: false }) : "—";
            document.getElementById('txtFecha').innerText = fechaAuto;
            document.getElementById('txtHora').innerText = horaAuto;
        }
        setInterval(actualizarReloj, 1000);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    coordenadas.lat = pos.coords.latitude;
                    coordenadas.lon = pos.coords.longitude;
                    document.getElementById('gpsStatus').innerText = `📍 GPS Listo: ${coordenadas.lat.toFixed(5)}, ${coordenadas.lon.toFixed(5)}`;
                    document.getElementById('gpsStatus').style.color = "green";
                },
                () => { document.getElementById('gpsStatus').innerText = "❌ Enciende el GPS."; },
                { enableHighAccuracy: true }
            );
        }

        function inicializarApp() {
            const selectNombre = document.getElementById('selectNombre');
            selectNombre.innerHTML = '<option value="">-- Selecciona --</option>';
            BASE_DE_DATOS_LOCAL.personal.forEach(p => selectNombre.innerHTML += `<option value="${p}">${p}</option>`);

            const selectComision = document.getElementById('selectComision');
            selectComision.innerHTML = '<option value="">-- Selecciona --</option>';
            BASE_DE_DATOS_LOCAL.comisiones.forEach(c => selectComision.innerHTML += `<option value="${c}">${c}</option>`);

            const selectMunicipio = document.getElementById('selectMunicipio');
            selectMunicipio.innerHTML = '<option value="">-- Selecciona --</option>';
            BASE_DE_DATOS_LOCAL.municipios.forEach(m => selectMunicipio.innerHTML += `<option value="${m}">${m}</option>`);
            
            actualizarReloj();
        }

        document.getElementById('fotoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400;
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    fotoBase64 = canvas.toDataURL('image/jpeg', 0.4); 
                    document.getElementById('fotoPreview').src = fotoBase64;
                    document.getElementById('previewContainer').classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('attendanceForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // 1. VALIDACIÓN estricta de Horario Permisible (De 7:00 AM a 10:01 AM)
            const ahora = new Date();
            const horaActual = ahora.getHours();
            const minutosActual = ahora.getMinutes();

            const demasiadoTemprano = (horaActual < 7);
            const demasiadoTarde = (horaActual > 10 || (horaActual === 10 && minutosActual >= 2));

            if (demasiadoTemprano || demasiadoTarde) {
                alert("❌ ERROR: Fuera del horario permitido. La plataforma solo recibe asistencias desde las 07:00 AM hasta las 10:01 AM de forma institucional.");
                return;
            }

            if (!coordenadas.lat) { alert("Se requieren datos GPS."); return; }
            
            const nombreSeleccionado = document.getElementById('selectNombre').value;
            let asistenciasAlmacenadas = JSON.parse(localStorage.getItem('saci_asistencias')) || [];

            // 2. VALIDACIÓN DE REGISTRO DUPLICADO
            const yaAsistio = asistenciasAlmacenadas.some(r => r.nombre === nombreSeleccionado && r.fecha === fechaAuto);
            if (yaAsistio) {
                alert(`⚠️ El elemento ${nombreSeleccionado} ya registró su asistencia el día de hoy. No se permiten duplicados.`);
                return;
            }

            // 3. GENERACIÓN DE ID DE REGISTRO ÚNICO AUTOMÁTICO
            const marcaTiempo = ahora.getDate().toString() + (ahora.getMonth()+1).toString() + ahora.getFullYear().toString();
            const numAleatorio = Math.floor(1000 + Math.random() * 9000);
            const idRegistroUnico = `SACI-${marcaTiempo}-${numAleatorio}`;

            const nuevoRegistro = {
                idRegistro: idRegistroUnico,
                id: document.getElementById('idPersonal').value,
                nomina: document.getElementById('selectNomina').value,
                nombre: nombreSeleccionado,
                comision: document.getElementById('selectComision').value,
                municipio: document.getElementById('selectMunicipio').value,
                fecha: fechaAuto, hora: horaAuto,
                latitud: coordenadas.lat, longitud: coordenadas.lon
            };

            asistenciasAlmacenadas.push(nuevoRegistro);
            localStorage.setItem('saci_asistencias', JSON.stringify(asistenciasAlmacenadas));

            // NOTIFICACIÓN PERSONALIZADA CON NOMBRE E ID ÚNICO
            alert(`📢 ¡ÉXITO!\nAsistencia guardada correctamente para: ${nuevoRegistro.nombre}.\nSu ID de Registro es: ${idRegistroUnico}`);
            location.reload();
        });

        function cargarDatosAdmin() {
            const registros = JSON.parse(localStorage.getItem('saci_asistencias')) || [];
            document.getElementById('numAsistencias').innerText = registros.length;
            
            const tabla = document.getElementById('tablaAsistencias');
            tabla.innerHTML = "";
            registros.slice().reverse().forEach(r => {
                tabla.innerHTML += `<div class="p-2 bg-white rounded border border-gray-200">
                    <strong>[REG: ${r.idRegistro || 'N/A'}] [ID: ${r.id}] [${r.nomina || 'N/A'}] ${r.nombre}</strong> - ${r.municipio}<br>
                    <span class="text-gray-400">${r.fecha} a las ${r.hora} | GPS: ${r.latitud}, ${r.longitud}</span>
                </div>`;
            });
            ejecutarCruce();
        }

        function ejecutarCruce() {
            const registros = JSON.parse(localStorage.getItem('saci_asistencias')) || [];
            const hoy = new Date().toLocaleDateString('es-MX');
            
            const asistieronHoy = registros.filter(r => r.fecha === hoy).map(r => r.nombre);
            const omisos = BASE_DE_DATOS_LOCAL.personal.filter(p => !asistieronHoy.includes(p));
            
            document.getElementById('numOmisos').innerText = omisos.length;
            const listaU = document.getElementById('listaOmisos');
            listaU.innerHTML = "";
            
            if(omisos.length === 0) {
                listaU.innerHTML = "<li>🎉 ¡Todo el personal ha reportado asistencia hoy!</li>";
            } else {
                omisos.forEach(o => { listaU.innerHTML += `<li>${o}</li>`; });
            }
        }

        function exportarExcel() {
            const registros = JSON.parse(localStorage.getItem('saci_asistencias')) || [];
            if(registros.length === 0) { alert("No hay datos para exportar."); return; }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
            csvContent += "ID Registro Unico,ID Personal,Tipo de Nomina,Nombre,Comision,Municipio,Fecha,Hora,Latitud,Longitud\n";

            registros.forEach(r => {
                csvContent += `"${r.idRegistro || ''}","${r.id}","${r.nomina || ''}","${r.nombre}","${r.comision}","${r.municipio}","${r.fecha}","${r.hora}","${r.latitud}","${r.longitud}"\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Reporte_Asistencias_${new Date().toLocaleDateString('es-MX')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function resetearSistema() {
            const confirmar = confirm("⚠️ ¿Estás absolutamente seguro de borrar TODAS las asistencias de la memoria? Esta acción no se puede deshacer.");
            if (confirmar) {
                localStorage.removeItem('saci_asistencias');
                alert("🔄 Sistema restablecido con éxito. Registros en cero.");
                cargarDatosAdmin();
            }
        }

        window.onload = inicializarApp;
    </script>
